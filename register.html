<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Playwrite+IT+Moderna:wght@100..400&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');">
    
    <style>
        .a{
            height: 150px;width: 200px;margin-left: 800px;
        }

        .th{
            font-size: 25px;padding-left: 10px;
        }

        .bod{
            border: 2px solid black;
            border-radius: 10px;
            width: 600px;
            margin-left: 600px; 
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            height: 600px;
        }

        .bod-1{
            font-size: 30px;
            padding-left: 20px;
        }

        input {
            margin-bottom: 25px;
            padding: 5px;
            width: 200px;
        }

        #but{
            background-color: rgb(255,216,20);
            width: 300px;
            height: 50px;
            border-radius: 50px;
            border-color:rgb(255,216,20);
            text-decoration: none;
            font-size: larger;top: 50px;position: relative;left: 120px;
        }

        .d{
            font-size: 25px;
            margin-left: 600px;
            margin-top: -120px;
            padding-left: 20px;
        }

        
        
       
    </style>
</head>
<body>
    <img src="Amazon.png" class="a" alt="">
    <form action="/post" method="post">
    <fieldset class="bod">    
        <h1 class="th">Create Account</h1>
        <table class="bod-1">
        <tr>
            <td><label for="name">Name:</label></td>
            <td><input type="text" id="name" name="name" style="height: 30px;width: 275px;" required></td>
        </tr>
        <tr>
            <td><label for="name">Email id:</label></td>
            <td><input type="text" id="name" name="email" style="height: 30px;width: 275px;" required></td>
        </tr>
        <tr>
            <td><label for="name">password:</label></td>
            <td><input type="text" id="name" name="password"  style="height: 30px;width: 275px;" required></td>
            <td>
                <p style="margin-left: -290px;margin-top: 90px;font-size: medium;">
                    ! Passwords must be at least 6 characters.
                </p>
            </td>
        </tr>
        <tr>
            <td><label for="name">Mobile:</label></td>
            <td><input type="text" id="name" name="mobile" style="height: 30px;width: 275px;" required></td>
        </tr>  
        <tr>
           <td><button id="but">Sign In</button></td>
        </tr>      
    </table>

   
   
    </fieldset>
</form>        
</body>
</html>
